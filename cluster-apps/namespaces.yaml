---
apiVersion: v1
kind: Namespace
metadata:
  name: default
  labels:
    goldilocks.fairwinds.com/enabled: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    pod-security.kubernetes.io/enforce: privileged # for NodeExporter
---
apiVersion: v1
kind: Namespace
metadata:
  name: networking
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    pod-security.kubernetes.io/enforce: privileged # for PodGateway
  annotations:
    kopiur.home-operations.com/privileged-movers: "true" # for privileged/root kopiur movers (authelia postgresql)
---
apiVersion: v1
kind: Namespace
metadata:
  name: selfhosted
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    pod-security.kubernetes.io/enforce: privileged # for sftpgo
  annotations:
    kopiur.home-operations.com/privileged-movers: "true" # for privileged/root kopiur movers
---
apiVersion: v1
kind: Namespace
metadata:
  name: vpn
  labels:
    goldilocks.fairwinds.com/enabled: "true"
    routed-gateway: "true"
    pod-security.kubernetes.io/enforce: privileged # for jd2
  annotations:
    kopiur.home-operations.com/privileged-movers: "true" # for privileged/root kopiur movers
---
apiVersion: v1
kind: Namespace
metadata:
  name: system-upgrade
  labels:
    goldilocks.fairwinds.com/enabled: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: kopiur-system
  labels:
    goldilocks.fairwinds.com/enabled: "true"
