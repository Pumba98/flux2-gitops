---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authelia-postgresql-data
spec:
  storageClassName: longhorn-backup
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 128Mi
  # dataSourceRef is immutable on the existing bound PVC, so it is left as-is.
  # On a PVC recreate / disaster-recovery rebuild, delete the volsync block below
  # and restore from kopiur instead:
  #   dataSourceRef:
  #     apiGroup: kopiur.home-operations.com
  #     kind: Restore
  #     name: authelia-postgresql-data
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: authelia-postgresql-data-backup
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: authelia-postgresql-data
spec:
  repository:
    kind: ClusterRepository
    name: primary
  copyMethod: Clone
  credentialProjection:
    enabled: true
  sources:
    - pvc:
        name: authelia-postgresql-data
  retention:
    keepDaily: 7
    keepWeekly: 1
  mover:
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false
    privilegedMode: true # captures UID/GID ownership so Restore can preserve it
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: authelia-postgresql-data
spec:
  policyRef:
    name: authelia-postgresql-data
  schedule:
    cron: "0 6 * * *"
    runOnCreate: false
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: authelia-postgresql-data
spec:
  repository:
    kind: ClusterRepository
    name: primary
  source:
    fromPolicy:
      name: authelia-postgresql-data
  target:
    populator: {}
  credentialProjection:
    enabled: true
  mover:
    privilegedMode: true
  policy:
    onMissingSnapshot: Continue
