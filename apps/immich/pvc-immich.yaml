---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: immich-static-pv
spec:
  capacity:
    storage: 250Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: smb
  mountOptions:
    - dir_mode=0777
    - file_mode=0777
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: immich-smb-volume
    volumeAttributes:
      source: "${SECRET_CIFS_SHARE}/immich"
    nodeStageSecretRef:
      name: smb-secrets
      namespace: kube-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich
spec:
  volumeName: immich-static-pv
  storageClassName: smb
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 250Gi
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: immich
spec:
  repository:
    kind: ClusterRepository
    name: primary
  # SMB-backed PVC: the CSI driver can't clone/snapshot, so read the live volume
  # directly (matches volsync copyMethod: Direct).
  copyMethod: Direct
  credentialProjection:
    enabled: true
  sources:
    - pvc:
        name: immich
  retention:
    keepDaily: 7
    keepWeekly: 1
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: immich
spec:
  policyRef:
    name: immich
  schedule:
    cron: "0 6 * * *"
    runOnCreate: false
# Disaster recovery: this is a static SMB volume (no volume-populator). To
# restore, apply a Restore that writes back into the existing PVC:
#   apiVersion: kopiur.home-operations.com/v1alpha1
#   kind: Restore
#   metadata: { name: immich }
#   spec:
#     repository: { kind: ClusterRepository, name: primary }
#     source: { fromPolicy: { name: immich } }
#     target: { pvcRef: { name: immich } }
#     credentialProjection: { enabled: true }
#     mover: { privilegedMode: true }
