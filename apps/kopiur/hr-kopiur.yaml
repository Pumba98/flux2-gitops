---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  interval: 5m
  chart:
    spec:
      chart: kopiur
      version: 0.7.3
      sourceRef:
        kind: HelmRepository
        name: home-operations-charts
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    installScope: cluster
    features:
      credentialProjection:
        enabled: true
    webhook:
      tls:
        mode: self
