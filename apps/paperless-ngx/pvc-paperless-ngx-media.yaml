---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-ngx-media-static-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: smb
  mountOptions:
    - dir_mode=0770
    - file_mode=0660
    - uid=33
    - gid=33
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: paperless-ngx-media-smb-volume
    volumeAttributes:
      source: "${SECRET_CIFS_SHARE}/paperless-ngx/media"
    nodeStageSecretRef:
      name: smb-secrets
      namespace: kube-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-ngx-media
spec:
  volumeName: paperless-ngx-media-static-pv
  storageClassName: smb
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: paperless-ngx-media
spec:
  repository:
    kind: ClusterRepository
    name: primary
  # SMB-backed PVC: the CSI driver can't clone/snapshot, so read the live volume
  # directly (matches volsync copyMethod: Direct).
  copyMethod: Direct
  credentialProjection:
    enabled: true
  sources:
    - pvc:
        name: paperless-ngx-media
  retention:
    keepDaily: 7
    keepWeekly: 1
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: paperless-ngx-media
spec:
  policyRef:
    name: paperless-ngx-media
  schedule:
    cron: "0 6 * * *"
    runOnCreate: false
# Disaster recovery: this is a static SMB volume (no volume-populator). To
# restore, apply a Restore that writes back into the existing PVC:
#   apiVersion: kopiur.home-operations.com/v1alpha1
#   kind: Restore
#   metadata: { name: paperless-ngx-media }
#   spec:
#     repository: { kind: ClusterRepository, name: primary }
#     source: { fromPolicy: { name: paperless-ngx-media } }
#     target: { pvcRef: { name: paperless-ngx-media } }
#     credentialProjection: { enabled: true }
#     mover: { privilegedMode: true }
