---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: syncthing-files-static-pv
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: smb
  mountOptions:
    - dir_mode=0777
    - file_mode=0777
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: syncthing-files-smb-volume
    volumeAttributes:
      source: "${SECRET_CIFS_SHARE}/files"
    nodeStageSecretRef:
      name: smb-secrets
      namespace: kube-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: syncthing-files-data
spec:
  volumeName: syncthing-files-static-pv
  storageClassName: smb
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Ti
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: syncthing-files-data
spec:
  repository:
    kind: ClusterRepository
    name: primary
  # SMB-backed PVC: the CSI driver can't clone/snapshot, so read the live volume
  # directly (matches volsync copyMethod: Direct).
  copyMethod: Direct
  credentialProjection:
    enabled: true
  sources:
    - pvc:
        name: syncthing-files-data
  retention:
    keepDaily: 7
    keepWeekly: 1
---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotSchedule
metadata:
  name: syncthing-files-data
spec:
  policyRef:
    name: syncthing-files-data
  schedule:
    cron: "0 6 * * *"
    runOnCreate: false
# Disaster recovery: this is a static SMB volume (no volume-populator). To
# restore, apply a Restore that writes back into the existing PVC:
#   apiVersion: kopiur.home-operations.com/v1alpha1
#   kind: Restore
#   metadata: { name: syncthing-files-data }
#   spec:
#     repository: { kind: ClusterRepository, name: primary }
#     source: { fromPolicy: { name: syncthing-files-data } }
#     target: { pvcRef: { name: syncthing-files-data } }
#     credentialProjection: { enabled: true }
#     mover: { privilegedMode: true }
